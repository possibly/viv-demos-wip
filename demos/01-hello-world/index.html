<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01 — Hello World · viv</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="../../" class="back">← demos</a>
    <h1>Hello World</h1>
    <p class="subtitle">Three characters in a tavern who greet each other.</p>
  </header>

  <main>
    <section class="setup">
      <div class="setup-row">
        <label for="seed-input">Seed</label>
        <input id="seed-input" type="text" value="hello-world" spellcheck="false" autocomplete="off">
      </div>
      <div class="setup-row">
        <label for="steps-input">Steps</label>
        <input id="steps-input" type="text" inputmode="numeric" pattern="[0-9]*" value="100">
        <button id="btn-run">Run</button>
      </div>
      <p id="status" class="status" hidden></p>
    </section>

    <section id="sim-view" hidden>
      <div class="timeline">
        <button id="btn-prev" class="timeline-btn" disabled>← Prev</button>
        <div class="timeline-info">
          <span id="tick-label" class="tick-label"></span>
          <span id="tick-time" class="tick-time"></span>
        </div>
        <button id="btn-next" class="timeline-btn">Next →</button>
      </div>

      <div class="tab-bar">
        <button class="tab-btn" data-tab="characters">Characters</button>
        <button class="tab-btn active" data-tab="chronicle">Chronicle</button>
      </div>

      <div id="tab-characters" class="tab-pane" hidden>
        <div id="characters" class="char-grid"></div>
      </div>
      <div id="tab-chronicle" class="tab-pane">
        <div id="events" class="event-list"></div>
      </div>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
