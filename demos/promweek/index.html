<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promweek · viv</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="../../" class="back">← demos</a>
    <h1>Promweek</h1>
    <p class="subtitle" id="subtitle">Northside High · the week before prom</p>
    <div class="scene-bar">
      <span id="act-label" class="scene-label">Act 1 · Loading…</span>
      <span id="turn-count" class="turn-count">Turn 0</span>
    </div>
  </header>

  <main>
    <p id="status" class="status" hidden></p>

    <!-- Alex card -->
    <section class="alex-section">
      <div class="char-card you">
        <div class="char-portrait">😎</div>
        <div class="char-name">Alex <span class="char-role">(you)</span></div>
        <ul class="char-traits">
          <li>charismatic</li>
          <li>ambitious</li>
          <li>impulsive</li>
        </ul>
      </div>
      <div class="alex-statuses" id="alex-statuses"></div>
    </section>

    <!-- Social cast -->
    <section class="cast">
      <div class="cast-header">The cast</div>
      <div class="cast-grid" id="cast-grid"></div>
    </section>

    <!-- Conversation log -->
    <section class="log-section">
      <div class="log-header">What happened</div>
      <div class="log" id="log"></div>
    </section>

    <!-- Action panel -->
    <section class="action-panel" id="action-panel">
      <div class="action-header">
        <span>Your move</span>
        <span class="hint" id="action-hint">Pick a target, then an intent</span>
      </div>
      <div class="target-row" id="target-row"></div>
      <div class="intent-row" id="intent-row"></div>
      <div class="commit-row">
        <button id="commit-btn" class="commit-btn" disabled>Make your move</button>
      </div>
    </section>

    <!-- Outcome overlay -->
    <div class="outcome" id="outcome" hidden></div>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
