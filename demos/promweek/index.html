<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promweek · viv</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="../../" class="back">← demos</a>
    <h1>Promweek</h1>
    <p class="subtitle" id="subtitle">Northside High · the week before prom</p>
    <div class="scene-bar">
      <span id="act-label" class="scene-label">Act 1 · Loading…</span>
      <span id="turn-count" class="turn-count">Turn 0</span>
    </div>
  </header>

  <main>
    <p id="status" class="status" hidden></p>

    <section class="goal-section" id="goal-section">
      <div class="goal-badge">Your goal</div>
      <div class="goal-content">
        <div class="goal-title" id="goal-title"></div>
        <div class="goal-flavor" id="goal-flavor"></div>
        <div class="goal-hint" id="goal-hint"></div>
      </div>
    </section>

    <section class="cast">
      <div class="cast-header">The cast — click an initiator, then a receiver</div>
      <div class="cast-grid" id="cast-grid"></div>
    </section>

    <section class="action-panel" id="action-panel">
      <div class="action-header">
        <span>Your move</span>
        <span class="hint" id="action-hint">Pick two characters above</span>
      </div>
      <div class="selection-bar">
        <div id="selection-label"><span class="hint">First click an initiator, then a receiver.</span></div>
        <button id="clear-selection" class="clear-btn" hidden>Clear</button>
      </div>
      <div class="action-list" id="action-list"></div>
    </section>

    <section class="log-section">
      <div class="log-header">What happened</div>
      <div class="log" id="log"></div>
    </section>

    <div class="outcome" id="outcome" hidden></div>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
